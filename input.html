<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>통빱 3루점 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { --bg: #f0f2f5; --tv: #1a1a2e; --pri: #e91e63; --sec: #007bff; --suc: #28a745; --err: #dc3545; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 10px;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    .store-header {
      padding: 10px 0;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      color: white;
      border-radius: 12px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .store-3ru { background: linear-gradient(135deg, #3F51B5, #5C6BC0); }

    .dashboard { background: var(--tv); border-radius: 15px; padding: 12px; color: white; margin-bottom: 10px; border: 2px solid #444; transition: border-color 0.3s; }
    .dashboard.tv-off { border-color: #e74c3c; animation: tvAlert 1s ease-in-out infinite; }
    @keyframes tvAlert { 0%,100%{ border-color: #e74c3c; } 50%{ border-color: #ff6b6b; box-shadow: 0 0 15px rgba(231,76,60,0.5); } }
    .tv-off-banner { display: none; background: #e74c3c; color: white; text-align: center; padding: 8px; font-weight: 900; font-size: 14px; border-radius: 8px; margin-top: 5px; animation: tvAlert 1s ease-in-out infinite; }
    .dashboard.tv-off .tv-off-banner { display: block; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .dash-toggle { font-size: 16px; transition: transform 0.3s; }
    .dash-toggle.collapsed { transform: rotate(180deg); }
    .v-screen { background: #000; border-radius: 8px; padding: 10px; min-height: 80px; max-height: 200px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; margin-top: 5px; transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s ease; overflow: hidden; }
    .v-screen.collapsed { max-height: 0; opacity: 0; padding: 0 10px; margin-top: 0; border-color: transparent; }
    .v-text { font-size: 18px; font-weight: 800; color: #0f0; margin-top: 5px; line-height: 1.4; }

    .content { flex: 1; overflow-y: auto; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .section-title { font-size: 15px; font-weight: bold; color: #555; margin: 14px 0 8px 5px; }

    button { border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.1s; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #ccc !important; color: #888 !important; cursor: not-allowed; }

    .input-num { width: 80px; height: 60px; border: 2px solid #ddd; border-radius: 10px; font-size: 20px; text-align: center; }
    .btn-call { flex: 1.2; height: 60px; font-size: 22px; background: linear-gradient(#ff9800, #f44336); color: white; }
    .btn-n { flex: 1; height: 60px; background: var(--sec); color: white; font-size: 16px; }

    .input-text { flex: 1; border: 2px solid #ddd; border-radius: 10px; padding: 10px; font-size: 15px; }
    .btn-action { width: 85px; background: var(--sec); color: white; }

    .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .btn-menu { height: 55px; background: white; border: 1px solid #ddd; font-size: 14px; }
    .sold-out { background: #ffebee; border-color: var(--err); color: var(--err); text-decoration: line-through; }

    .btn-ctrl { height: 50px; flex: 1; background: #eee; font-size: 14px; }
    .btn-blue { background: var(--sec); color: white; }
    .btn-green { background: var(--suc); color: white; }
    .btn-red { background: var(--err); color: white; }

    .pw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
    .pw-modal.active { display: flex; }
    .pw-modal-content { background: white; border-radius: 15px; padding: 25px; width: 280px; text-align: center; }
    .pw-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: #333; }
    .pw-input { width: 100%; height: 50px; border: 2px solid #ddd; border-radius: 10px; font-size: 24px; text-align: center; letter-spacing: 8px; margin-bottom: 15px; box-sizing: border-box; }
    .pw-input:focus { border-color: var(--sec); outline: none; }
    .pw-buttons { display: flex; gap: 10px; }
    .pw-btn { flex: 1; height: 45px; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; }
    .pw-cancel { background: #eee; color: #333; }
    .pw-confirm { background: var(--sec); color: white; }
  </style>
</head>
<body>
  <div class="store-header store-3ru">3루점 관리자</div>

  <div class="dashboard">
    <div class="dashboard-header" onclick="toggleDashboard()">
      <span>📺 TV 모니터링</span>
      <span id="conn"><span style="color:#e74c3c">●</span> TV 연결끊김</span>
      <span class="dash-toggle" id="dashToggle">▲</span>
    </div>
    <div class="tv-off-banner">⚠️ TV 연결이 끊겼습니다! 확인해주세요</div>
    <div class="v-screen" id="vScreen">
      <div id="v-mode" style="font-size:12px; color:#ffc107; font-weight: bold;">모드: 서버 연결 중...</div>
      <div id="v-msg" class="v-text">연결을 기다리는 중입니다.</div>
      <div id="v-list" style="font-size:12px; color:#fff; opacity:0.7; margin-top:5px;">호출 목록: ---</div>
    </div>
  </div>

  <div class="content">
    <div class="section-title">📢 번호 호출 제어</div>
    <div class="row">
      <input type="number" id="cNum" class="input-num" placeholder="번호" />
      <button class="btn-call" id="callB" onclick="hCall()">📢 호출</button>
      <button class="btn-n" onclick="hPlus(1)">+1번</button>
      <button class="btn-n" onclick="hPlus(3)">+3번</button>
      <button class="btn-n" onclick="hPlus(5)">+5번</button>
    </div>

    <div class="section-title">🍽️ 서빙 알림 (10초간 상단 메시지 노출)</div>
    <div class="row">
      <input type="number" id="sNum" class="input-text" style="flex:0.3" placeholder="번호" />
      <button class="btn-green btn-action" style="flex:1" onclick="hServe()">번까지 드립니다</button>
    </div>

    <div class="section-title">📝 하단 전광판 텍스트 고정</div>
    <div class="row">
      <input type="text" id="mIn" class="input-text" placeholder="고정할 문구를 입력하세요" />
      <button class="btn-blue btn-action" id="sB" onclick="hSendM()">고정 전송</button>
      <button class="btn-ctrl" style="flex:0.3" onclick="hClearM()">지우기</button>
    </div>

    <div class="section-title">🚫 실시간 메뉴 품절 관리</div>
    <div class="menu-grid" id="mG">
      <button class="btn-menu" onclick="tMenu('소세지나쵸')">소세지나쵸</button>
      <button class="btn-menu" onclick="tMenu('비빔면')">비빔면</button>
      <button class="btn-menu" onclick="tMenu('김치말이국수')">김치말이국수</button>
      <button class="btn-menu" onclick="tMenu('삼겹살')">삼겹살</button>
      <button class="btn-menu" onclick="tMenu('우동')">우동</button>
      <button class="btn-menu" onclick="tMenu('잔치국수')">잔치국수</button>
    </div>

    <div class="section-title">⚙️ 시스템 및 화면 제어</div>
    <div class="row">
      <button class="btn-ctrl" onclick="sMode('WAITING')">📺 홍보화면</button>
      <button class="btn-ctrl btn-blue" onclick="sMode('CALL')">📢 호출화면</button>
    </div>
    <div class="row">
      <button class="btn-ctrl btn-red" onclick="hReset()">🧹 전체 초기화</button>
      <button class="btn-ctrl btn-red" id="closedB" onclick="hFullC()">🚫 재고마감</button>
      <button class="btn-ctrl btn-green" id="releaseB" onclick="hRelease()">🔄 마감 해제</button>
    </div>
    <div class="row">
      <button class="btn-ctrl" onclick="reloadTV()">📺 TV 새로고침</button>
    </div>
  </div>

  <div id="pwModal" class="pw-modal">
    <div class="pw-modal-content">
      <div class="pw-title">🔒 비밀번호 확인</div>
      <input type="password" id="pwInput" class="pw-input" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" />
      <div class="pw-buttons">
        <button class="pw-btn pw-cancel" onclick="closePwModal(false)">취소</button>
        <button class="pw-btn pw-confirm" onclick="closePwModal(true)">확인</button>
      </div>
    </div>
  </div>

  <script>
    const STORE = '3ru';
    let currentStatusText = "";
    let ws;
    let last = 0;
    let currentMode = 'WAITING';
    let isBusy = false;
    let msgDisplayFixed = false;
    let monitorTimer = null;
    let currentFixedMsg = "";
    let isClosed = false;
    let pwResolve = null;

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function send(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(msg); }

    function toggleDashboard() {
      document.getElementById('vScreen').classList.toggle('collapsed');
      document.getElementById('dashToggle').classList.toggle('collapsed');
    }

    function checkPW() {
      return new Promise(resolve => {
        pwResolve = resolve;
        document.getElementById('pwInput').value = '';
        document.getElementById('pwModal').classList.add('active');
        setTimeout(() => document.getElementById('pwInput').focus(), 100);
      });
    }
    function closePwModal(confirm) {
      document.getElementById('pwModal').classList.remove('active');
      if (pwResolve) {
        pwResolve(confirm && document.getElementById('pwInput').value === "1234");
        pwResolve = null;
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pwInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') closePwModal(true);
      });
    });

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        ws.send(`INPUT:${STORE}`);
      };

      ws.onclose = () => {
        document.getElementById('v-msg').innerText = "서버와 연결이 끊겼습니다. 재연결 중...";
        document.getElementById('v-mode').innerText = "모드: 연결 끊김";
        document.getElementById('v-mode').style.color = "#ff4757";
        setTimeout(connect, 5000);
      };

      ws.onmessage = (e) => {
        let d;
        try { d = JSON.parse(e.data); } catch { return; }

        if (d.type === 'PING') {
          try { ws.send(JSON.stringify({ type: 'PONG' })); } catch(e) {}
          return;
        }

        if (d.type === 'DISPLAY_ON') {
          document.getElementById('conn').innerHTML = '<span style="color:#2ecc71">●</span> TV 연결됨';
          document.querySelector('.dashboard').classList.remove('tv-off');
        }
        if (d.type === 'DISPLAY_OFF') {
          document.getElementById('conn').innerHTML = '<span style="color:#e74c3c">●</span> TV 연결끊김';
          document.querySelector('.dashboard').classList.add('tv-off');
        }

        if (d.type === 'MODE') {
          currentMode = d.mode;
          updateModeUI();
        }

        if (d.type === 'CALL') {
          const list = d.list || [];
          if (list.length > 0) last = Number(list[list.length - 1]);
          else last = 0;
          document.getElementById('v-list').innerText = `호출 목록: ${list.join(', ') || '없음'}`;
          if (list.length > 0 && !msgDisplayFixed) {
            updateModeUI();
          }
        }

        if (d.type === 'MSG_DISPLAY') {
          if (monitorTimer) clearTimeout(monitorTimer);
          const inputEl = document.getElementById('mIn');

          if (d.text && d.text.trim()) {
            msgDisplayFixed = true;
            if (d.duration < 90000) {
              currentFixedMsg = `<span style="color:#ff9800">[임시] ${escHtml(d.text)}</span>`;
              monitorTimer = setTimeout(() => {
                msgDisplayFixed = false;
                currentFixedMsg = "";
                updateModeUI();
              }, d.duration);
            } else {
              currentFixedMsg = `<span style="color:#00c6ff">[고정] ${escHtml(d.text)}</span>`;
              inputEl.disabled = true;
            }
          } else {
            msgDisplayFixed = false;
            currentFixedMsg = "";
            inputEl.disabled = false;
          }
          updateModeUI();
        }

        if (d.type === 'STATUS') {
          currentStatusText = d.text || "";
          updateModeUI();
        }

        if (d.type === 'MSG') {
          const text = d.text || "";
          if (text.includes('재고소진') || text.includes('마감')) {
            document.getElementById('v-mode').innerText = "모드: 🚫 재고 마감 화면";
            document.getElementById('v-mode').style.color = "#ff4757";
            document.getElementById('v-msg').innerHTML = `<span style="color:#ff4757">${escHtml(text)}</span>`;
            setClosedMode(true);
          } else {
            if (isClosed) setClosedMode(false);
            if (!msgDisplayFixed) {
              document.getElementById('v-msg').innerText = text;
              updateModeUI();
            }
          }
        }

        if (d.type === 'MENU_UPDATE') updateMenuUI(d.soldOutMenus);
      };
    }

    function updateModeUI() {
      const modeEl = document.getElementById('v-mode');
      const msgEl = document.getElementById('v-msg');
      modeEl.style.color = "#ffc107";

      if (currentMode === 'WAITING') {
        modeEl.innerText = "모드: 📺 홍보 화면 노출 중";
      } else {
        modeEl.innerText = "모드: 📢 호출 화면 노출 중";
      }

      let combinedHtml = "";

      if (currentStatusText) {
        combinedHtml += `<div style="color: #4CAF50; font-size: 14px; margin-bottom: 4px;">● 판매상태: ${escHtml(currentStatusText)}</div>`;
      }

      if (msgDisplayFixed && currentFixedMsg) {
        combinedHtml += `<div style="line-height: 1.2;">${currentFixedMsg}</div>`;
      }

      if (!combinedHtml) {
        combinedHtml = currentMode === 'WAITING' ? "홍보 영상 노출 중" : "대기 중...";
      }

      msgEl.innerHTML = combinedHtml;
    }

    function setClosedMode(closed) {
      isClosed = closed;
      document.querySelectorAll('button').forEach(btn => {
        if (btn.id === 'releaseB') return;
        if (btn.closest('.pw-modal')) return;
        btn.disabled = closed;
      });
      document.querySelectorAll('input').forEach(inp => {
        if (inp.closest('.pw-modal')) return;
        inp.disabled = closed;
      });
    }

    function ensureCallMode() { if (currentMode !== 'CALL') send('MODE:CALL'); }

    function hCall() {
      const e = document.getElementById('cNum');
      if (e.value) {
        ensureCallMode();
        send(`CALL:${e.value}`);
        e.value = '';
      } else if (last > 0) {
        ensureCallMode();
        send('CALL_LAST');
      }
    }

    async function hPlus(n) {
      if (isBusy) return;
      isBusy = true;
      ensureCallMode();
      const startNum = Number(last);
      for (let i = 1; i <= n; i++) {
        send(`CALL:${startNum + i}`);
        await new Promise(r => setTimeout(r, 1500));
      }
      isBusy = false;
    }

    function hServe() {
      const e = document.getElementById('sNum');
      if (!e.value) return;
      ensureCallMode();
      send(`MSG_DISPLAY:${e.value}번 손님까지 드립니다|10000`);
      e.value = '';
    }

    function hSendM() {
      const inputEl = document.getElementById('mIn');
      const val = inputEl.value;
      if (val) {
        send(`MSG_DISPLAY:${val}|999999`);
        inputEl.disabled = true;
      }
    }

    function hClearM() {
      const inputEl = document.getElementById('mIn');
      send(`MSG_DISPLAY: |1`);
      inputEl.value = '';
      inputEl.disabled = false;
    }

    async function sMode(m) {
      if (m === 'WAITING' && currentMode === 'CALL') { if (!(await checkPW())) return; }
      send(`MODE:${m}`);
    }



    async function reloadTV() { if (await checkPW()) send('RELOAD_DISPLAY'); }
    function tMenu(m) { send(`TOGGLE_MENU:${m}`); }

    function updateMenuUI(list) {
      if (!list) return;
      document.querySelectorAll('.btn-menu').forEach(btn => {
        const menuName = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
        if (list.includes(menuName)) {
          btn.classList.add('sold-out');
        } else {
          btn.classList.remove('sold-out');
        }
      });
    }

    function hReset() { if (confirm("호출 목록을 모두 지우시겠습니까?")) send('CLEAR'); }

    async function hFullC() {
      if (await checkPW()) {
        send(`MSG:금일 재고소진으로 인해 마감합니다. 대단히 죄송합니다.`);
        setClosedMode(true);
      }
    }

    function hRelease() {
      send('MSG:안녕하세요! 통빱 입니다');
      setClosedMode(false);
    }

    connect();
  </script>
</body>
</html>
