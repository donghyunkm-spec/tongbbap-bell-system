<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>통빱 1루점 관리자</title>
  <style>
    :root { --bg: #f0f2f5; --tv: #1a1a2e; --pri: #e91e63; --sec: #007bff; --suc: #28a745; --err: #dc3545; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    
    .dashboard { background: var(--tv); border-radius: 15px; padding: 12px; color: white; margin-bottom: 10px; border: 2px solid #444; }
    .v-screen { background: #000; border-radius: 8px; padding: 10px; min-height: 80px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; }
    .v-text { font-size: 18px; font-weight: 800; color: #0f0; margin-top: 5px; line-height: 1.4; }
    
    .content { flex: 1; overflow-y: auto; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .section-title { font-size: 13px; font-weight: bold; color: #555; margin: 12px 0 6px 5px; }
    
    button { border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.1s; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #ccc !important; color: #888 !important; cursor: not-allowed; }
    
    .input-num { width: 65px; border: 2px solid #ddd; border-radius: 10px; font-size: 20px; text-align: center; }
    .btn-call { flex: 1.2; height: 60px; font-size: 22px; background: linear-gradient(#ff9800, #f44336); color: white; }
    .btn-n { flex: 1; height: 60px; background: var(--sec); color: white; }
    
    .input-text { flex: 1; border: 2px solid #ddd; border-radius: 10px; padding: 10px; font-size: 15px; }
    .btn-action { width: 85px; background: var(--sec); color: white; }
    
    .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .btn-menu { height: 45px; background: white; border: 1px solid #ddd; font-size: 12px; }
    .sold-out { background: #ffebee; border-color: var(--err); color: var(--err); text-decoration: line-through; }
    
    .btn-ctrl { height: 45px; flex: 1; background: #eee; font-size: 13px; }
    .btn-blue { background: var(--sec); color: white; }
    .btn-green { background: var(--suc); color: white; }
    .btn-red { background: var(--err); color: white; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
      <span>📺 실시간 TV 모니터링 (1루점)</span>
      <span id="conn"><span style="color:#e74c3c">●</span> TV 연결끊김</span>
    </div>
    <div class="v-screen">
      <div id="v-mode" style="font-size:12px; color:#ffc107; font-weight: bold;">모드: 서버 연결 중...</div>
      <div id="v-msg" class="v-text">연결을 기다리는 중입니다.</div>
      <div id="v-list" style="font-size:12px; color:#fff; opacity:0.7; margin-top:5px;">호출 목록: ---</div>
    </div>
  </div>

  <div class="content">
    <div class="section-title">📢 번호 호출 제어</div>
    <div class="row">
      <input type="number" id="cNum" class="input-num" placeholder="번호" />
      <button class="btn-call" id="callB" onclick="hCall()">📢 호출</button>
      <button class="btn-n" onclick="hPlus(1)">+1</button>
      <button class="btn-n" onclick="hPlus(3)">+3</button>
      <button class="btn-n" onclick="hPlus(5)">+5</button>
    </div>

    <div class="section-title">🍽️ 서빙 알림 (10초간 상단 메시지 노출)</div>
    <div class="row">
      <input type="number" id="sNum" class="input-text" style="flex:0.3" placeholder="번호" />
      <button class="btn-green btn-action" style="flex:1" onclick="hServe()">번까지 드립니다</button>
    </div>

    <div class="section-title">📝 하단 전광판 텍스트 고정</div>
    <div class="row">
      <input type="text" id="mIn" class="input-text" placeholder="고정할 문구를 입력하세요" />
      <button class="btn-blue btn-action" id="sB" onclick="hSendM()">고정 전송</button>
      <button class="btn-ctrl" style="flex:0.3" onclick="hClearM()">지우기</button>
    </div>

    <div class="section-title">🚫 실시간 메뉴 품절 관리</div>
    <div class="menu-grid" id="mG">
      <button class="btn-menu" onclick="tMenu('소세지나쵸')">소세지나쵸</button>
      <button class="btn-menu" onclick="tMenu('비빔면')">비빔면</button>
      <button class="btn-menu" onclick="tMenu('김치말이국수')">김치말이국수</button>
      <button class="btn-menu" onclick="tMenu('삼겹살')">삼겹살</button>
      <button class="btn-menu" onclick="tMenu('우동')">우동</button>
      <button class="btn-menu" onclick="tMenu('잔치국수')">잔치국수</button>
    </div>

    <div class="section-title">⚙️ 시스템 및 화면 제어</div>
    <div class="row">
      <button class="btn-ctrl" onclick="sMode('WAITING')">📺 홍보화면 전환</button>
      <button class="btn-ctrl btn-blue" onclick="sMode('CALL')">📢 호출화면 전환</button>
      <button class="btn-ctrl btn-green" onclick="sDef()">🍜 판매중 기본설정</button>
    </div>
    <div class="row">
      <button class="btn-ctrl btn-red" onclick="hReset()">🧹 번호 전체 초기화</button>
      <button class="btn-ctrl btn-red" id="closedB" onclick="hFullC()">🚫 재고마감 전송</button>
      <button class="btn-ctrl btn-green" id="releaseB" onclick="hRelease()">🔄 마감 해제</button>
    </div>
  </div>

  <script>
    const STORE = '1ru';
    let ws;
    let last = 0;
    let currentMode = 'WAITING';
    let isBusy = false;
    let msgDisplayFixed = false;
    let currentStatusText = "";
    let monitorTimer = null; // 모니터용 타이머 추가
    let currentFixedMsg = ""; // 전광판/임시 메시지 저장용 변수 추가
    let isClosed = false; // 재고마감 상태 추적

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function send(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(msg); }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => { 
        ws.send(`INPUT:${STORE}`);
      };

      ws.onclose = () => {
        document.getElementById('v-msg').innerText = "서버와 연결이 끊겼습니다. 재연결 중...";
        document.getElementById('v-mode').innerText = "모드: 연결 끊김";
        document.getElementById('v-mode').style.color = "#ff4757";
        setTimeout(connect, 3000);
      };

      ws.onmessage = (e) => {
        let d;
        try { d = JSON.parse(e.data); } catch { return; }
        
        if (d.type === 'PING') {
          try { ws.send(JSON.stringify({ type: 'PONG' })); } catch(e) {}
          return;
        }
        
        if (d.type === 'DISPLAY_ON') {
          document.getElementById('conn').innerHTML = '<span style="color:#2ecc71">●</span> TV 연결됨';
        }
        if (d.type === 'DISPLAY_OFF') {
          document.getElementById('conn').innerHTML = '<span style="color:#e74c3c">●</span> TV 연결끊김';
        }
        
        if (d.type === 'MODE') { 
          currentMode = d.mode;
          updateModeUI();
        }
        
        if (d.type === 'CALL') { 
          const list = d.list || []; 
          if (list.length > 0) last = Number(list[list.length - 1]);
          else last = 0;
          document.getElementById('v-list').innerText = `호출 목록: ${list.join(', ') || '없음'}`;
          if (list.length > 0 && !msgDisplayFixed) {
            updateModeUI();
          }
        }

        if (d.type === 'MSG_DISPLAY') {
          if (monitorTimer) clearTimeout(monitorTimer);
          const inputEl = document.getElementById('mIn');

          if (d.text && d.text.trim()) {
            msgDisplayFixed = true;
            if (d.duration < 90000) {
              currentFixedMsg = `<span style="color:#ff9800">[임시] ${escHtml(d.text)}</span>`;
              monitorTimer = setTimeout(() => {
                msgDisplayFixed = false;
                currentFixedMsg = "";
                updateModeUI();
              }, d.duration);
            } else {
              currentFixedMsg = `<span style="color:#00c6ff">[고정] ${escHtml(d.text)}</span>`;
              inputEl.disabled = true; // 고정 문구 → 입력창 비활성화 (재연결 시에도 복원)
            }
          } else {
            msgDisplayFixed = false;
            currentFixedMsg = "";
            inputEl.disabled = false; // 문구 없음 → 입력창 활성화
          }
          updateModeUI();
        }

        // STATUS 처리 부분 수정
        if (d.type === 'STATUS') {
          currentStatusText = d.text || "";
          updateModeUI(); // 무조건 업데이트하여 실시간 반영
        }
        
        if (d.type === 'MSG') {
          const text = d.text || "";
          if (text.includes('재고소진') || text.includes('마감')) {
            document.getElementById('v-mode').innerText = "모드: 🚫 재고 마감 화면";
            document.getElementById('v-mode').style.color = "#ff4757";
            document.getElementById('v-msg').innerHTML = `<span style="color:#ff4757">${escHtml(text)}</span>`;
            setClosedMode(true);
          } else {
            if (isClosed) setClosedMode(false);
            if (!msgDisplayFixed) {
              document.getElementById('v-msg').innerText = text;
              updateModeUI();
            }
          }
        }

        if (d.type === 'MENU_UPDATE') updateMenuUI(d.soldOutMenus);
      };
    }

    function updateModeUI() {
      const modeEl = document.getElementById('v-mode');
      const msgEl = document.getElementById('v-msg');
      modeEl.style.color = "#ffc107";

      // 1. 상단 모드 텍스트 설정
      if (currentMode === 'WAITING') {
        modeEl.innerText = "모드: 📺 홍보 화면 노출 중";
      } else {
        modeEl.innerText = "모드: 📢 호출 화면 노출 중";
      }

      // 2. 메시지 영역 병합 생성
      let combinedHtml = "";

      // [상태] 판매중 기본 설정 메시지 (초록색)
      if (currentStatusText) {
        combinedHtml += `<div style="color: #4CAF50; font-size: 14px; margin-bottom: 4px;">● 판매상태: ${escHtml(currentStatusText)}</div>`;
      }

      // [전광판] 고정 또는 임시 메시지 (하늘색/주황색)
      if (msgDisplayFixed && currentFixedMsg) {
        combinedHtml += `<div style="line-height: 1.2;">${currentFixedMsg}</div>`;
      }

      // 만약 아무 메시지도 없다면 기본 안내 문구 표시
      if (!combinedHtml) {
        combinedHtml = currentMode === 'WAITING' ? "홍보 영상 노출 중" : "대기 중...";
      }

      msgEl.innerHTML = combinedHtml;
    }

    function setClosedMode(closed) {
      isClosed = closed;
      document.querySelectorAll('button').forEach(btn => {
        if (btn.id === 'releaseB') return;
        btn.disabled = closed;
      });
      document.querySelectorAll('input').forEach(inp => {
        inp.disabled = closed;
      });
    }

    function checkPW() { return prompt("보안 비밀번호를 입력하세요 (4자리)") === "1234"; }

    function ensureCallMode() { if (currentMode !== 'CALL') send('MODE:CALL'); }

    function hCall() {
      const e = document.getElementById('cNum');
      if (e.value) {
        ensureCallMode();
        send(`CALL:${e.value}`);
        e.value = '';
      } else if (last > 0) {
        ensureCallMode();
        send('CALL_LAST');
      }
    }

    async function hPlus(n) {
      if (isBusy) return;
      isBusy = true;
      ensureCallMode();
      const startNum = Number(last);
      for (let i = 1; i <= n; i++) {
        send(`CALL:${startNum + i}`);
        await new Promise(r => setTimeout(r, 1500));
      }
      isBusy = false;
    }

    function hServe() {
      const e = document.getElementById('sNum');
      if (!e.value) return;
      ensureCallMode();
      send(`MSG_DISPLAY:${e.value}번 손님까지 드립니다|10000`);
      e.value = '';
    }

    function hSendM() {
      const inputEl = document.getElementById('mIn');
      const val = inputEl.value;
      if (val) {
        send(`MSG_DISPLAY:${val}|999999`);
        inputEl.disabled = true; // 입력창 비활성화
      }
    }

    function hClearM() {
      const inputEl = document.getElementById('mIn');
      send(`MSG_DISPLAY: |1`);
      inputEl.value = '';      // 내용 초기화
      inputEl.disabled = false; // 입력창 활성화
    }

    function sMode(m) {
      if (m === 'WAITING' && currentMode === 'CALL') { if (!checkPW()) return; }
      send(`MODE:${m}`);
    }

    function sDef() {
      const defaultMsg = "김치말이국수 판매 중입니다";
      // 현재 문구와 같으면 빈 값을 보내서 해제, 다르면 문구 전송
      if (currentStatusText === defaultMsg) {
        send(`STATUS: `);
      } else {
        send(`STATUS:${defaultMsg}`);
      }
    }

    function tMenu(m) { send(`TOGGLE_MENU:${m}`); }

    function updateMenuUI(list) {
      if (!list) return;
      document.querySelectorAll('.btn-menu').forEach(btn => {
        const menuName = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
        if (list.includes(menuName)) {
          btn.classList.add('sold-out');
        } else {
          btn.classList.remove('sold-out');
        }
      });
    }

    function hReset() { if (confirm("호출 목록을 모두 지우시겠습니까?")) send('CLEAR'); }

    function hFullC() {
      if (checkPW()) {
        send(`MSG:금일 재고소진으로 인해 마감합니다. 대단히 죄송합니다.`);
        setClosedMode(true);
      }
    }

    function hRelease() {
      send('MSG:안녕하세요! 통빱 입니다');
      setClosedMode(false);
    }

    connect();
  </script>
</body>
</html>
